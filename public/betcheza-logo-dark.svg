<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <!-- Icon mark: blue rounded square (same as light) -->
  <g transform="translate(8 6)">
    <rect x="0" y="0" width="68" height="68" rx="14" fill="#1565C0"/>
    <rect x="0" y="0" width="68" height="32" rx="14" fill="white" fill-opacity="0.06"/>

    <!-- Crown (gold) -->
    <polygon points="11,28 17,15 23,28" fill="#FFC107"/>
    <polygon points="25,28 34,5 43,28" fill="#FFC107"/>
    <polygon points="45,28 51,15 57,28" fill="#FFC107"/>
    <rect x="9" y="26" width="50" height="9" rx="2.5" fill="#FFC107"/>
    <circle cx="19" cy="30" r="2" fill="#E53935"/>
    <circle cx="34" cy="30" r="2" fill="#E53935"/>
    <circle cx="49" cy="30" r="2" fill="#E53935"/>

    <!-- Letter B (white stroke) -->
    <g stroke="white" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M 15 38 L 15 63"/>
      <path d="M 15 38 L 30 38 Q 43 38 43 46 Q 43 54 30 54 L 15 54"/>
      <path d="M 15 54 L 33 54 Q 48 54 48 60 L 15 60"/>
