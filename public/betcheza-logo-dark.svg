  </g>

  <!-- Wordmark: white text for dark backgrounds -->
  <g transform="translate(90 0)">
    <text x="0" y="52"
      font-family="ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial"
      font-weight="900" font-size="42" letter-spacing="-1.5" fill="#F8FAFC">betch<tspan fill="#64B5F6">e</tspan>za</text>
    <rect x="2" y="60" width="50" height="3" rx="1.5" fill="#1565C0"/>
    <text x="58" y="65"
      font-family="ui-sans-serif,system-ui"
      font-weight="600" font-size="11" letter-spacing="2.5" fill="#94A3B8">SMART · BETS · DAILY</text>
  </g>
