<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Blue rounded background -->
  <rect x="2" y="2" width="60" height="60" rx="13" fill="#1565C0"/>
  <!-- Subtle top shine -->
  <rect x="2" y="2" width="60" height="28" rx="13" fill="white" fill-opacity="0.06"/>

  <!-- Crown (gold) -->
  <!-- Left prong -->
  <polygon points="11,26 17,13 23,26" fill="#FFC107"/>
  <!-- Center prong (tallest) -->
  <polygon points="25,26 32,7 39,26" fill="#FFC107"/>
  <!-- Right prong -->
  <polygon points="41,26 47,13 53,26" fill="#FFC107"/>
  <!-- Crown base band -->
  <rect x="9" y="24" width="46" height="8" rx="2.5" fill="#FFC107"/>
  <!-- Crown jewels -->
  <circle cx="19" cy="28" r="1.8" fill="#E53935"/>
  <circle cx="32" cy="28" r="1.8" fill="#E53935"/>
  <circle cx="45" cy="28" r="1.8" fill="#E53935"/>

  <!-- Letter B (white stroke) -->
  <g stroke="white" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Spine -->
    <path d="M 17 35 L 17 57"/>
    <!-- Upper bowl -->
    <path d="M 17 35 L 29 35 Q 40 35 40 42 Q 40 49 29 49 L 17 49"/>
    <!-- Lower bowl -->
    <path d="M 17 49 L 31 49 Q 44 49 44 54 Q 44 59 31 59 L 17 59"/>
  </g>
</svg>
